# Golden-model registry for stress + bench.
#
# Precision policy (project-wide): correctness tests run on **8-bit**
# (or higher). The pipeline catches engine bugs in rapid-mlx; we don't
# want quant noise on 4-bit models producing failures that look like
# rapid-mlx bugs but are actually model-capability ceilings. Reserved
# 4-bit runs (perf benches) live in dedicated scripts:
#   - scripts/bench_dflash.py
#   - scripts/bench_suffix_decoding_integrated.py
#   - harness/runs/ (when explicitly targeting 4-bit user reality)
# A documented example of the 4-bit pitfall this policy avoids:
# Qwen3.6-27B-4bit + thinking + multi-tool composition reliably
# generates a 4000-token natural-language ramble without ever emitting
# a valid <tool_call> XML (proven 2026-05-15). The 8-bit variant emits
# both calls in 286 tokens. Identical engine code; quant noise was the
# only variable. Keep new candidates 8-bit unless the family has no
# 8-bit option (very rare today on mlx-community / unsloth).
#
# Each family is a logical model line (Qwen3, Qwen3.5, MiniMax …). The
# pipeline picks ONE candidate per family — the highest-quality one
# whose `ram_gb_required` fits on the current machine (with some
# headroom). If nothing fits, the family is skipped.
#
# `quality_tier` is for display + tie-breaking, not for selection. It
# describes how trustworthy the quantization is for behavior testing:
#   - golden:   the canonical sweet spot — use when validating "the
#               server still works"
#   - smoke:    too small to catch much, but always-runnable so we can
#               at least confirm boot + inference + token streaming
#   - small/medium: middle of the road
#
# `stop_at_first_fit`: keep the highest-quality entry per family that
# fits the machine; we don't run multiple sizes from the same family
# (they'd test the same code paths).
#
# Add new families by appending. Entries are evaluated top-to-bottom
# within a family — put highest-quality first.
families:
  - family: qwen3-smoke
    candidates:
      - id: mlx-community/Qwen3-0.6B-8bit
        ram_gb_required: 2
        quality_tier: smoke

  - family: qwen3.5
    candidates:
      # 8-bit, 35B A3B MoE — chosen so the model itself ~never errs on
      # the eval suite. Quant noise on a 4-bit small model makes it hard
      # to tell "model got confused" from "rapid-mlx broke something",
      # which is the signal pr_validate exists to catch. 8-bit + a real-
      # capacity model isolates engine bugs cleanly.
      - id: mlx-community/Qwen3.5-35B-A3B-8bit
        ram_gb_required: 36
        quality_tier: golden

  - family: qwen3.6
    candidates:
      # 8-bit, same principle as Qwen3.5-35B-A3B-8bit above: correctness
      # tests need a precision where the model itself ~never errs so
      # failures cleanly attribute to rapid-mlx. The 4-bit variant has
      # a documented multi-tool capability deficit (proven empirically
      # 2026-05-15: Qwen3.6-27B-4bit + thinking + 2-tool composition →
      # 4000-token natural-language ramble, no <tool_call> XML emitted;
      # identical task on 8-bit emits both tool calls in 286 tokens).
      # Performance measurements against the 4-bit variant belong in
      # `bench_dflash` / `bench_suffix_decoding_integrated` / harness
      # benchmarks, not in the correctness gate.
      - id: unsloth/Qwen3.6-27B-MLX-8bit
        ram_gb_required: 32
        quality_tier: golden

# Gemma 4 was previously listed here for orthogonal coverage (different
# chat template + tool-call format) but observed in PR #208 validation
# to fail multiple agent tests due to model-side instruction-following
# weaknesses (writes essays for "Count to 5", refuses to call tools,
# forgets multi-turn context). Per project rule "we want models that
# ~never err so failures cleanly attribute to rapid-mlx", gemma4 does
# not meet the bar today and is excluded from automatic validation.
#
# When mlx-community ships a tighter Gemma 4 instruction-tuned variant
# (or when our Gemma chat template ships better few-shot priming), add
# it back as:
#   - family: gemma4
#     candidates:
#       - id: mlx-community/gemma-4-<NEW_VERSION>
#         ram_gb_required: 14
#         quality_tier: golden
#
# SmolLM3-3B and Granite 4 H-Tiny (added to model_auto_config.py in
# the profile-consolidation PR) were ALSO not added here for the same
# reason. Validation results in that PR:
#   - SmolLM3-3B-4bit: 10/17 across anthropic_sdk + langchain +
#     pydantic_ai — model is too small (3B) to reliably follow
#     tool-call schemas, structured-output schemas, or multi-turn
#     context. Same class of model-side weakness as Gemma 4.
#   - Granite 4 H-Tiny 4bit: 16/17 — borderline, ~94% pass rate. The
#     single fail (pydantic_ai single tool call) is a model-quality
#     edge case (off-topic Java/Spring response). Not flaky enough
#     to block merges, but adding here would gate every PR on it.
# Both families remain available via ``rapid-mlx serve smollm3-3b``
# and ``rapid-mlx serve granite4-tiny`` (auto-detected parsers).

# Per-model overrides: extra CLI args (e.g. parser overrides for
# tool-calling tests). Keep small — most models don't need this.
#
# ``--enable-auto-tool-choice`` is required even when the parser is
# auto-detected (model_auto_config picks the parser; the flag toggles
# the API-level OpenAI-style tool-choice routing). The explicit
# ``--tool-call-parser hermes`` is redundant with the registry today
# but documents intent at the validation surface.
overrides:
  "mlx-community/Qwen3.5-35B-A3B-8bit":
    args: ["--enable-auto-tool-choice", "--tool-call-parser", "hermes"]
  "unsloth/Qwen3.6-27B-MLX-8bit":
    args: ["--enable-auto-tool-choice", "--tool-call-parser", "hermes"]

# Agent integrations — each is a tests/integrations/ test_X.py script
# we exec against the live server. The matrix is models × agents.
# Tests that already work today; we expand the list as integrations
# stabilize.
agents:
  - name: anthropic_sdk
    script: tests/integrations/test_anthropic_sdk.py
    # Tests skipped for tiny models — Anthropic streaming + 0.6B is the
    # known #185 false-positive zone.
    skip_for_smoke: false
  - name: langchain
    script: tests/integrations/test_langchain.py
    skip_for_smoke: false
  - name: pydantic_ai
    script: tests/integrations/test_pydantic_ai_full.py
    skip_for_smoke: true  # multi-tool fails on 0.6B; expected
