name: codex
display_name: "Codex CLI"
repo: "openai/codex"
stars: 75000

# Codex CLI (https://github.com/openai/codex) is OpenAI's official Rust-based
# coding agent. It talks to the OpenAI Responses API (POST /v1/responses) —
# rapid-mlx >= 0.7.10 implements a stateless shim that lets Codex use any
# local model as the backend.
#
# Config lives at ~/.codex/config.toml. Codex picks the active provider from
# ``model_provider`` and resolves its base_url from the matching
# [model_providers.NAME] section.
config:
  type: toml
  path: "~/.codex/config.toml"
  template: |
    # Generated by `rapid-mlx agents codex --setup`. Codex CLI reads
    # `model_provider` and then looks up the matching block below.
    model = "{model_id}"
    model_provider = "rapid-mlx"

    [model_providers.rapid-mlx]
    name = "Rapid-MLX (local)"
    base_url = "{base_url}"
    # No auth field — rapid-mlx is unauthed by default and Codex
    # `--strict-config` rejects an inline literal like `api_key = "..."`.
    # If you start the server with `--api-key`, add:
    #     env_key = "RAPID_MLX_API_KEY"
    # and `export RAPID_MLX_API_KEY=<your-key>` in your shell.
    # The /v1/responses path is the hot path Codex uses; rapid-mlx
    # exposes it directly. No wire_api override needed.

models:
  # Codex is sensitive to model quality — small models lose on its
  # multi-tool / apply_patch workloads. 9B is the practical floor; the
  # 35B Qwen3.6 is the recommended workhorse on M3 Max class hardware.
  recommended:
    - "qwen3.6-35b-4bit"
    - "qwen3.5-9b-4bit"
    - "qwen3-coder-30b-4bit"
  parser_override: null

streaming:
  extra_tool_tags: []
  suppress_patterns: []
  # Codex CLI tool count — apply_patch + run_shell + a handful of
  # bookkeeping calls. Cap at 10 to match what Codex exposes.
  max_tools: 10

testing:
  binary: codex
  # Codex CLI exposes a one-shot mode via `codex exec` for headless runs;
  # the older `codex '<query>'` shorthand still works on most installs.
  query_cmd: "codex exec '{query}'"
  query_timeout: 120
  install_cmd: "brew install codex   # or: npm install -g @openai/codex"

capabilities:
  function_calling: true
  streaming: true
  vision: false
  reasoning: true  # Codex sends reasoning.effort; rapid-mlx ignores it in v1

# Known issues are kept short and only those that affect the rapid-mlx
# integration on the current Codex + rapid-mlx >= 0.7.10 combo.
known_issues:
  - "Codex CLI runs commands via Landlock (Linux) / Seatbelt (macOS) — first run prompts for sandbox permissions; this is Codex behaviour, unrelated to rapid-mlx."
  - "`previous_response_id` is not implemented (openai/codex#3841) and the rapid-mlx shim is stateless — Codex re-sends the full conversation in `input[]` each turn, which is what makes the local backend work."
  - "Codex hardcodes `stream: true`; rapid-mlx's /v1/responses emits the 7 SSE events Codex parses (response.created, response.output_text.delta, response.function_call_arguments.delta, response.completed, etc.)."
  - "Codex's `reasoning.effort` field is accepted but not yet mapped to enable_thinking — set thinking via `rapid-mlx serve --enable-thinking` instead."
  - "gemma-4-12b-it (any quant) hangs Codex ~60% of trials on tool-use prompts due to a model-side `thought\\n…` degenerate loop — model bug filed at huggingface.co/google/gemma-4-12B-it/discussions/41 (downstream tracking issue #686 closed). Use qwen3.5/3.6 models for Codex CLI agent workflows."
