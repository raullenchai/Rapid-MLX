name: Validate community benchmark submission

# Gate every PR that touches community-benchmarks/submissions/ through
# the schema + sanity checks in scripts/validate.py. The CLI runs the
# same checks on the submitter's machine, but the JSON file in the PR
# is the authoritative artifact — we re-validate it here so a manually-
# edited submission can't sneak past.

on:
  pull_request:
    paths:
      - "community-benchmarks/submissions/**"
      - "community-benchmarks/schema.json"
      - "community-benchmarks/scripts/validate.py"
      - "vllm_mlx/aliases.json"

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the merge-base so we can diff against the PR target
          # and only validate files actually changed in this PR.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install validator deps
        run: |
          python -m pip install --upgrade pip
          # ``jsonschema`` is the only dep; everything else in
          # validate.py is stdlib. Pinning keeps CI deterministic.
          pip install 'jsonschema>=4.0,<5.0'

      - name: Detect and validate changed submissions
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # CRITICAL: NEVER expand untrusted filenames as shell tokens.
          # A PR can add a submission file whose name contains shell
          # metacharacters (`;`, backticks, `$()`); piping that name
          # through `${{ steps.X.outputs.Y }}` into `bash -c` would
          # execute it as code on the runner.
          #
          # We avoid the injection surface entirely by:
          #   1. Using `git diff -z` to get NUL-separated paths (no
          #      delimiter clash possible).
          #   2. Reading the NUL-stream with `xargs -0`, which passes
          #      each filename as a single argv entry to Python — the
          #      shell never tokenizes the names.
          #
          # The merge-base resolves the actual fork point on the
          # target branch instead of "wherever main is right now."
          set -euo pipefail
          BASE=$(git merge-base "origin/${BASE_REF}" HEAD)
          echo "merge-base: $BASE"

          # NUL-separated diff. -z disables pathname quoting AND
          # changes the field separator to NUL. Empty output means
          # no changed submission files.
          git diff -z --name-only --diff-filter=AM "$BASE" HEAD \
            -- 'community-benchmarks/submissions/*.json' \
            > /tmp/changed-paths.nul || true

          if [ ! -s /tmp/changed-paths.nul ]; then
            # No new submission JSONs in this PR, but the workflow was
            # triggered — that means one of the validation inputs
            # changed (schema, validator script, or alias whitelist).
            # Re-validate every existing submission so a schema bump or
            # alias rename can't accidentally orphan old rows. (Codex
            # PR #582 round-2 NIT.) ``validate.py`` with no argv
            # defaults to all files in submissions/.
            echo "No submission files in this PR diff — re-validating the entire submission corpus against the changed schema/validator/aliases."
            python community-benchmarks/scripts/validate.py
            exit $?
          fi

          echo "Changed submission files:"
          # `tr '\0' '\n'` only for the human-readable log line;
          # the validator reads the raw NUL stream below.
          tr '\0' '\n' < /tmp/changed-paths.nul

          # xargs -0 reads the NUL-separated paths and appends them
          # as argv entries. -r ensures we exit 0 cleanly if the file
          # is empty (already short-circuited above, but defensive).
          # The validator's exit code becomes the job's exit code.
          xargs -0 -r python community-benchmarks/scripts/validate.py \
            < /tmp/changed-paths.nul
