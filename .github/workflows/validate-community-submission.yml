name: Validate community benchmark submission

# Gate every PR that touches community-benchmarks/submissions/ through
# the schema + sanity checks in scripts/validate.py. The CLI runs the
# same checks on the submitter's machine, but the JSON file in the PR
# is the authoritative artifact — we re-validate it here so a manually-
# edited submission can't sneak past.

on:
  pull_request:
    paths:
      - "community-benchmarks/submissions/**"
      - "community-benchmarks/schema.json"
      - "community-benchmarks/scripts/validate.py"
      - "vllm_mlx/aliases.json"

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the merge-base so we can diff against the PR target
          # and only validate files actually changed in this PR.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install validator deps
        run: |
          python -m pip install --upgrade pip
          # ``jsonschema`` is the only dep; everything else in
          # validate.py is stdlib. Pinning keeps CI deterministic.
          pip install 'jsonschema>=4.0,<5.0'

      - name: Detect and validate changed submissions
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # CRITICAL: NEVER expand untrusted filenames as shell tokens.
          # A PR can add a submission file whose name contains shell
          # metacharacters (`;`, backticks, `$()`); piping that name
          # through `${{ steps.X.outputs.Y }}` into `bash -c` would
          # execute it as code on the runner.
          #
          # We avoid the injection surface entirely by:
          #   1. Using `git diff -z` to get NUL-separated paths (no
          #      delimiter clash possible).
          #   2. Reading the NUL-stream with `xargs -0`, which passes
          #      each filename as a single argv entry to Python — the
          #      shell never tokenizes the names.
          #
          # The merge-base resolves the actual fork point on the
          # target branch instead of "wherever main is right now."
          set -euo pipefail
          BASE=$(git merge-base "origin/${BASE_REF}" HEAD)
          echo "merge-base: $BASE"

          # The submissions/ tree is contractually APPEND-ONLY (see
          # README "Submission storage" section). Append-only means
          # exactly one mutation is allowed: Add. Modify / Delete /
          # Rename / Copy / Type-change are all rewrites of history.
          # (Codex PR #582 round-3 BLOCKING caught D+R; round-4
          # BLOCKING flagged the AM filter still letting Modify
          # through.) `--diff-filter=a` is the lowercase "anything
          # but A" — anything matching it is a rewrite and fails the
          # job. Then we validate only the Added files below.
          REWRITES=$(git diff --name-only --diff-filter=a "$BASE" HEAD \
            -- 'community-benchmarks/submissions/*.json' || true)
          if [ -n "$REWRITES" ]; then
            echo "::error::This PR modifies / deletes / renames append-only submission files:"
            echo "$REWRITES" | sed 's/^/  /'
            echo "::error::Submissions are append-only — adding new files is fine, but existing files may not be modified, deleted, or renamed. To correct a wrong number, add a new submission rather than editing an old one."
            exit 1
          fi

          # Independently detect whether any *validation input* changed
          # — schema, validator script, or alias whitelist. If so, the
          # entire corpus must be re-checked against the new rules even
          # when this PR also adds new submission files. Earlier
          # revisions only ran full-corpus validation when no added
          # files existed, so a PR that bumped the schema AND added a
          # row could land schema-breaking changes against every
          # already-merged submission without any of them being
          # checked. (Codex PR #582 round-6 BLOCKING.)
          SCHEMA_CHANGED=$(git diff --name-only "$BASE" HEAD -- \
            'community-benchmarks/schema.json' \
            'community-benchmarks/scripts/validate.py' \
            'vllm_mlx/aliases.json' || true)

          if [ -n "$SCHEMA_CHANGED" ]; then
            echo "Validation inputs changed in this PR:"
            echo "$SCHEMA_CHANGED" | sed 's/^/  /'
            echo "Re-validating the entire submission corpus against the new schema/validator/aliases."
            python community-benchmarks/scripts/validate.py
          fi

          # Validate only ADDED files. NUL-separated for safe argv
          # handling (-z disables pathname quoting AND uses NUL as
          # the field separator). Empty output means no new submission
          # files.
          git diff -z --name-only --diff-filter=A "$BASE" HEAD \
            -- 'community-benchmarks/submissions/*.json' \
            > /tmp/changed-paths.nul || true

          if [ ! -s /tmp/changed-paths.nul ]; then
            if [ -z "$SCHEMA_CHANGED" ]; then
              # Workflow triggered but nothing relevant changed —
              # shouldn't happen given the path filter, but bail
              # cleanly if it does.
              echo "No submission files added and no validation inputs changed; nothing to validate."
            fi
            exit 0
          fi

          echo "Changed submission files:"
          # `tr '\0' '\n'` only for the human-readable log line;
          # the validator reads the raw NUL stream below.
          tr '\0' '\n' < /tmp/changed-paths.nul

          # xargs -0 reads the NUL-separated paths and appends them
          # as argv entries. -r ensures we exit 0 cleanly if the file
          # is empty (already short-circuited above, but defensive).
          # The validator's exit code becomes the job's exit code.
          xargs -0 -r python community-benchmarks/scripts/validate.py \
            < /tmp/changed-paths.nul
