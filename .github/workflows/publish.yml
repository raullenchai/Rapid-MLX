name: Publish to PyPI & Homebrew

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package (retry on magic-byte collision)
        # PyPI's _is_valid_dist_file rejects any file where both
        # zipfile.is_zipfile() and tarfile.is_tarfile() return True
        # (https://github.com/pypi/warehouse/blob/main/warehouse/forklift/legacy.py).
        # Compressed output is non-deterministic; ~rare rebuilds emit
        # bytes that coincidentally match the other format's magic.
        # We rebuild up to 5 times until neither artifact collides.
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            rm -rf dist/ build/
            python -m build
            if python3 -c "
          import glob, sys, tarfile, zipfile
          ok = True
          for f in sorted(glob.glob('dist/*')):
              z = zipfile.is_zipfile(f); t = tarfile.is_tarfile(f)
              print(f'  {f}: zip={z} tar={t}')
              if z and t: ok = False
          sys.exit(0 if ok else 2)
          "; then
              echo "Build attempt $attempt: clean (no PyPI magic-byte collision)"
              exit 0
            fi
            echo "Build attempt $attempt: magic-byte collision detected, rebuilding..."
          done
          echo "ERROR: 5 builds in a row hit PyPI's zip+tar collision check"
          exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # skip-existing lets the workflow recover from a partial upload
        # (e.g. wheel succeeded but sdist 400'd) without needing a fresh
        # version bump on retry.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Wait for PyPI to propagate
        run: sleep 30

      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch tarball URL and SHA256
        id: pypi
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Poll PyPI until the new version appears (max 5 minutes)
          for i in $(seq 1 10); do
            URL=$(curl -fsSL "https://pypi.org/pypi/rapid-mlx/${VERSION}/json" 2>/dev/null \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print([u['url'] for u in d['urls'] if u['packagetype']=='sdist'][0])" 2>/dev/null) && break
            echo "Waiting for PyPI... (attempt $i)"
            sleep 30
          done
          if [ -z "$URL" ]; then echo "Failed to find tarball on PyPI"; exit 1; fi

          # Download and compute SHA256
          curl -fsSL "$URL" -o /tmp/rapid-mlx.tar.gz
          SHA256=$(sha256sum /tmp/rapid-mlx.tar.gz | cut -d' ' -f1)
          rm /tmp/rapid-mlx.tar.gz

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Found: $URL (sha256: $SHA256)"

      - name: Update Homebrew formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: raullenchai/homebrew-rapid-mlx
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ steps.version.outputs.version }}",
              "url": "${{ steps.pypi.outputs.url }}",
              "sha256": "${{ steps.pypi.outputs.sha256 }}"
            }
